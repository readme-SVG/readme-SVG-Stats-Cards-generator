<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Custom Badge Generator</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #0b1020; color: #e6ecff; }
    .wrap { max-width: 1050px; margin: 0 auto; padding: 28px 18px 40px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { margin: 0 0 18px; color: #b8c3dd; }
    .card { background: #121a30; border: 1px solid #26314d; border-radius: 14px; padding: 18px; margin-top: 14px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #91a0bf; }
    input, select { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #314062; background: #0f1730; color: #e6ecff; padding: 10px; }
    input[type="color"] { padding: 4px; height: 40px; }
    .checks { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; }
    .checks label { display: flex; gap: 8px; align-items: center; margin: 0; font-size: 13px; color: #c7d3f0; }
    .preview { min-height: 95px; display: flex; align-items: center; justify-content: center; border: 1px dashed #3a4d78; border-radius: 10px; background: #0d1427; }
    .actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button { border: none; border-radius: 10px; background: #4f7cff; color: white; padding: 10px 14px; font-weight: 600; cursor: pointer; }
    button.alt { background: #273556; }
    code { background: #0a1228; border: 1px solid #2a3a60; padding: 2px 6px; border-radius: 6px; }
    textarea { width: 100%; min-height: 74px; resize: vertical; border: 1px solid #314062; background: #0f1730; color: #dbe7ff; border-radius: 10px; padding: 10px; box-sizing: border-box; }
    .color-wrap { display: grid; grid-template-columns: 1fr 48px; gap: 8px; }
    .palette { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid #273556; box-sizing: border-box;
    }
    .swatch:hover { border-color: #dbe7ff; }
    .palette-row { margin-top: 12px; }
    .palette-row small { color: #9db0d7; display: block; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Custom Badge Generator</h1>
    <p>Настраивай всё: текст, стиль, тему, цвета, размер, пресеты и формат markdown.</p>

    <div class="card">
      <div class="grid">
        <div><label>Preset</label><select id="preset"></select></div>
        <div><label>Style</label><select id="style"></select></div>
        <div><label>Theme</label><select id="theme"></select></div>
        <div><label>Icon</label><select id="icon"></select></div>
        <div><label>Label</label><input id="label" value="build" /></div>
        <div><label>Value</label><input id="value" value="passing" /></div>
        <div><label>Size</label><select id="size"></select></div>
        <div><label>Scale (0.7..2)</label><input id="scale" type="number" min="0.7" max="2" step="0.05" value="1" /></div>
        <div><label>Border Radius</label><input id="border_radius" type="number" min="0" max="999" value="4" /></div>

        <div>
          <label>Label BG</label>
          <div class="color-wrap"><input id="label_bg" placeholder="#1f2937" /><input id="label_bg_picker" type="color" value="#1f2937" /></div>
        </div>
        <div>
          <label>Value BG</label>
          <div class="color-wrap"><input id="value_bg" placeholder="#111827" /><input id="value_bg_picker" type="color" value="#111827" /></div>
        </div>
        <div>
          <label>Label Color</label>
          <div class="color-wrap"><input id="label_color" placeholder="#f3f4f6" /><input id="label_color_picker" type="color" value="#f3f4f6" /></div>
        </div>
        <div>
          <label>Value Color</label>
          <div class="color-wrap"><input id="value_color" placeholder="#93c5fd" /><input id="value_color_picker" type="color" value="#93c5fd" /></div>
        </div>
        <div>
          <label>Border Color</label>
          <div class="color-wrap"><input id="border_color" placeholder="#374151" /><input id="border_color_picker" type="color" value="#374151" /></div>
        </div>
      </div>

      <div class="palette-row">
        <small>Palette for all color fields</small>
        <div class="palette" id="palette"></div>
      </div>

      <div class="checks">
        <label><input id="gradient" type="checkbox" /> gradient</label>
        <label><input id="uppercase" type="checkbox" /> uppercase</label>
        <label><input id="compact" type="checkbox" /> compact</label>
      </div>

      <div class="actions">
        <button id="render">Render</button>
        <button class="alt" id="copy-url">Copy URL</button>
        <button class="alt" id="copy-md">Copy Markdown</button>
      </div>
    </div>

    <div class="card">
      <div class="preview" id="preview">Loading preview…</div>
      <p style="margin-top:10px; margin-bottom:8px;">Badge URL</p>
      <textarea id="url" readonly></textarea>
      <p style="margin-top:10px; margin-bottom:8px;">Markdown</p>
      <textarea id="markdown" readonly></textarea>
      <p style="margin-top:10px;">Endpoint: <code>/badge</code>, metadata: <code>/catalog</code></p>
    </div>
  </div>

  <script>
    const ids = ["preset","style","theme","icon","label","value","size","scale","label_bg","value_bg","label_color","value_color","border_color","border_radius","gradient","uppercase","compact"];
    const input = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
    const pickers = {
      label_bg: document.getElementById("label_bg_picker"),
      value_bg: document.getElementById("value_bg_picker"),
      label_color: document.getElementById("label_color_picker"),
      value_color: document.getElementById("value_color_picker"),
      border_color: document.getElementById("border_color_picker")
    };
    const preview = document.getElementById("preview");
    const urlBox = document.getElementById("url");
    const mdBox = document.getElementById("markdown");

    const colorFields = Object.keys(pickers);
    let activeColorField = "label_bg";

    const syncInputWithPicker = (field) => {
      const val = input[field].value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        pickers[field].value = val;
      }
    };

    const buildQuery = () => {
      const q = new URLSearchParams();
      Object.entries(input).forEach(([key, el]) => {
        if (el.type === "checkbox") {
          if (el.checked) q.set(key, "true");
          return;
        }
        if (el.value.trim()) q.set(key, el.value.trim());
      });
      return q.toString();
    };

    const render = () => {
      const query = buildQuery();
      const badgeUrl = `${location.origin}/badge?${query}`;
      preview.innerHTML = `<img alt="badge preview" src="${badgeUrl}" />`;
      urlBox.value = badgeUrl;
      mdBox.value = `![custom badge](${badgeUrl})`;
    };

    const copyText = async (text) => navigator.clipboard.writeText(text);

    document.getElementById("render").addEventListener("click", render);
    document.getElementById("copy-url").addEventListener("click", async () => copyText(urlBox.value));
    document.getElementById("copy-md").addEventListener("click", async () => copyText(mdBox.value));

    ids.forEach(id => input[id].addEventListener("change", render));
    ["label","value","scale","border_radius", ...colorFields].forEach(id => {
      input[id].addEventListener("input", () => {
        if (colorFields.includes(id)) syncInputWithPicker(id);
        render();
      });
      if (colorFields.includes(id)) {
        input[id].addEventListener("focus", () => { activeColorField = id; });
      }
    });

    Object.entries(pickers).forEach(([field, picker]) => {
      picker.addEventListener("input", () => {
        input[field].value = picker.value;
        render();
      });
      picker.addEventListener("focus", () => { activeColorField = field; });
    });

    fetch("/catalog")
      .then(r => r.json())
      .then(catalog => {
        const appendOptions = (el, values) => values.forEach(v => el.insertAdjacentHTML("beforeend", `<option value="${v}">${v}</option>`));
        appendOptions(input.style, catalog.styles);
        appendOptions(input.theme, catalog.themes);
        appendOptions(input.icon, catalog.icons);
        appendOptions(input.size, catalog.sizes);
        appendOptions(input.preset, Object.keys(catalog.presets));

        const paletteEl = document.getElementById("palette");
        (catalog.palette || []).forEach(color => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "swatch";
          btn.style.background = color;
          btn.title = `${color} → ${activeColorField}`;
          btn.addEventListener("click", () => {
            input[activeColorField].value = color;
            pickers[activeColorField].value = color;
            render();
          });
          paletteEl.appendChild(btn);
        });

        input.preset.addEventListener("change", () => {
          const p = catalog.presets[input.preset.value];
          if (!p) return;
          input.label.value = p.label;
          input.value.value = p.value;
          input.icon.value = p.icon;
          input.theme.value = p.theme;
          input.style.value = p.style;
          input.size.value = p.size || "md";
          render();
        });

        input.preset.value = "build";
        input.style.value = "flat";
        input.theme.value = "terminal";
        input.icon.value = "check";
        input.size.value = "md";
        colorFields.forEach(syncInputWithPicker);
        render();
      })
      .catch(() => {
        preview.textContent = "Failed to load catalog.";
      });
  </script>
</body>
</html>
