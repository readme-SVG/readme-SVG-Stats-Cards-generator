# ──────────────────────────────────────────────────────────────
# Python Linting & Formatting — Ruff
# Runs on every push / PR targeting main.
# Ruff is an extremely fast Python linter + formatter written
# in Rust that replaces flake8, isort, pycodestyle, and more.
# ──────────────────────────────────────────────────────────────

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same PR / branch.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff lint & format check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # UPDATE: match the Python version used by the project.
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        # Lint all Python files; returns non-zero on errors.
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        # Fails if any file would be reformatted (dry-run).
        run: ruff format --check .
