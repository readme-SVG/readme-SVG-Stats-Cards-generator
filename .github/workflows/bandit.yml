# ──────────────────────────────────────────────────────────────
# Bandit — Python Security Linter
# Scans Python source for common security issues (hardcoded
# passwords, use of exec/eval, insecure hashing, etc.) and
# uploads SARIF results to GitHub Security tab.
# ──────────────────────────────────────────────────────────────

name: Bandit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bandit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # UPDATE: match the Python version used by the project.
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit scan
        # Scan all Python files recursively; output as SARIF for
        # GitHub Security tab integration.
        # -r .     → recursive from repo root
        # -f sarif → SARIF output format
        # -ll      → report only medium-severity and above
        # Continue on findings so SARIF is always uploaded.
        run: bandit -r . -f sarif -o bandit-results.sarif -ll --exit-zero

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit
